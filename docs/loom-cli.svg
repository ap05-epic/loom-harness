<svg xmlns="http://www.w3.org/2000/svg" width="720" height="384" viewBox="0 0 720 384" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" role="img" aria-label="The loom startup identity panel: the brass LOOM wordmark over the active model, project, and SQLite backend">
  <title>loom — startup identity</title>
  <rect x="0.5" y="0.5" width="719" height="383" rx="12" fill="#0E1017" stroke="#232735"/>
  <line x1="0" y1="44" x2="720" y2="44" stroke="#232735"/>
  <circle cx="24" cy="22" r="6" fill="#FF5F57"/>
  <circle cx="44" cy="22" r="6" fill="#FEBC2E"/>
  <circle cx="64" cy="22" r="6" fill="#28C840"/>
  <text x="92" y="27" font-size="13" fill="#9AA0AE">loom — workspace</text>

  <g font-size="16" xml:space="preserve">
    <image x="16" y="62" width="384" height="110" preserveAspectRatio="xMinYMid meet" href="data:image/png;base64," role="img" aria-label="LOOM"/>
    <text x="22" y="202" fill="#E8BB6E"> ╰─┼─┼─┼── H A R N E S S ──┼─┼─┼─╯</text>
  </g>
  <text x="23" y="224" font-size="13" fill="#6B7280" font-style="italic">legacy UI, rebuilt faithfully</text>

  <g font-size="14" xml:space="preserve">
    <text x="24" y="262"><tspan fill="#6B7280">version  </tspan><tspan fill="#E8BB6E">1.0.0</tspan></text>
    <text x="24" y="284"><tspan fill="#6B7280">model    </tspan><tspan fill="#E8BB6E">gpt-5.4</tspan><tspan fill="#6B7280">  (openai · Azure key)</tspan></text>
    <text x="24" y="306"><tspan fill="#6B7280">project  </tspan><tspan fill="#C9CDD6">demo</tspan><tspan fill="#6B7280">  ~/loom-data/demo</tspan></text>
    <text x="24" y="328"><tspan fill="#6B7280">backend  </tspan><tspan fill="#9AA0AE">node:sqlite</tspan></text>
  </g>
  <text x="24" y="360" font-size="13" fill="#6B7280" xml:space="preserve">▸ loom run --shift     loom ui     loom --help</text>
