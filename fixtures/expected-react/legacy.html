<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign in</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
      }
      .card {
        width: 320px;
        margin: 60px auto;
        padding: 24px;
        background: #ffffff;
        border: 1px solid #cccccc;
      }
      .title {
        margin: 0 0 16px;
        font-size: 20px;
        color: #333333;
      }
      .form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 13px;
        color: #555555;
      }
      .field input {
        padding: 6px;
        border: 1px solid #bbbbbb;
        font-size: 14px;
      }
      .btn {
        padding: 8px;
        border: none;
        background: #11aa55;
        color: #ffffff;
        font-size: 14px;
        cursor: pointer;
      }
      .link {
        display: inline-block;
        margin-top: 12px;
        font-size: 13px;
        color: #11aa55;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="card">
        <h1 class="title">Sign in</h1>
        <form class="form" action="/auth.do" method="post">
          <label class="field">
            Username
            <input name="user" type="text" />
          </label>
          <label class="field">
            Password
            <input name="pass" type="password" />
          </label>
          <button class="btn" type="submit">Log in</button>
        </form>
        <a class="link" href="/help.do">Need help?</a>
      </div>
    </div>
  </body>
</html>
